[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arctx-cli"
version = "0.2.0b2"
description = "CLI for ARCTX — append-only DAG for reasoning history and parallel agent work"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Takumi Ishida"},
]
keywords = ["cli", "arctx", "dag", "agents", "developer-tools", "workflow"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
]
dependencies = [
    "arctx>=0.2.0b2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

[project.scripts]
arctx = "arctx_cli.main:main"

[project.urls]
Homepage = "https://github.com/takumiecd/arctx"
Repository = "https://github.com/takumiecd/arctx"

[tool.hatch.build.targets.wheel]
packages = ["src/arctx_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I", "N", "D", "UP", "B", "C4", "SIM"]
ignore = ["D100", "D104", "D203", "D213"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
